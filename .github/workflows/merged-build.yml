name: PR Verification & Merge Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        id: gradle-build
        run: |
          set +e

          # Build the APK (version comes from version.properties, not the build)
          ./gradlew assembleDebug --build-cache > build.log 2>&1

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          cat build.log
          if [ $EXIT_CODE -ne 0 ]; then
            false
          fi

      # ------------------------------------------------------------------
      # FAILURE HANDLING
      # ------------------------------------------------------------------
      - name: Report Failure to Jules
        if: failure() && steps.gradle-build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let logTail = 'Log file not found.';
            try { logTail = fs.readFileSync('build.log', 'utf8').slice(-4000); } catch (e) {}

            const assignee = 'gemini-code-assist';

            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Build Failure on ${context.eventName === 'pull_request' ? 'PR #' + context.issue.number : context.ref}`,
                body: `@${assignee} /jules debug this build error\n\n**Log:**\n\`\`\`\n${logTail}\n\`\`\``,
                labels: ['jules', 'bug'],
                assignees: [assignee]
              });
            } catch (error) {
              console.log("Failed to create issue with assignee. Retrying without assignee.");
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Build Failure on ${context.eventName === 'pull_request' ? 'PR #' + context.issue.number : context.ref}`,
                body: `@${assignee} /jules debug this build error\n\n**Log:**\n\`\`\`\n${logTail}\n\`\`\``,
                labels: ['jules', 'bug']
              });
            }

      # ------------------------------------------------------------------
      # RELEASE STEPS (Only run on PUSH, not Pull Requests)
      # ------------------------------------------------------------------
      - name: Prepare Release Variables
        if: success() && github.event_name == 'push'
        id: release_vars
        run: |
          # version.properties is the single source of truth. VERSION_NAME
          # mirrors the APK's internal versionName.versionCode (e.g. 1.0.5.16).
          MAJOR=$(grep 'versionMajor=' version.properties | cut -d'=' -f2 | tr -d '\r ' || echo "1")
          MINOR=$(grep 'versionMinor=' version.properties | cut -d'=' -f2 | tr -d '\r ' || echo "0")
          PATCH=$(grep 'versionPatch=' version.properties | cut -d'=' -f2 | tr -d '\r ' || echo "0")
          BUILD=$(grep 'versionBuild=' version.properties | cut -d'=' -f2 | tr -d '\r ' || echo "1")

          VERSION_NAME="$MAJOR.$MINOR.$PATCH.$BUILD"

          TAG_NAME="latest-debug-v${MAJOR}.${MINOR}"

          # Dynamic App Name from settings.gradle
          APP_NAME=$(grep 'rootProject.name' settings.gradle.kts | sed -E "s/.*=.*[\"'](.*)[\"']/\1/" || echo "App")

          # Locate built APK
          APK_ORIGINAL=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)

          if [ -z "$APK_ORIGINAL" ]; then
             echo "Error: No APK found to release!"
             false
          fi

          TARGET_NAME="${APP_NAME}-${VERSION_NAME}-debug.apk"

          # Rename for release
          mv "$APK_ORIGINAL" "$TARGET_NAME"

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "APK_FILE=$TARGET_NAME" >> $GITHUB_ENV

      - name: Publish Release
        if: success() && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use GH CLI to release

          # Check if release exists
          if gh release view $TAG_NAME > /dev/null 2>&1; then
             echo "Updating existing release..."

             gh release edit $TAG_NAME --prerelease \
               --title "Latest Debug Build ($TAG_NAME)" \
               --notes "Auto-build from commit $GITHUB_SHA" \
               --target $GITHUB_SHA

             gh release upload $TAG_NAME "$APK_FILE" --clobber
          else
             echo "Creating new release..."
             gh release create $TAG_NAME "$APK_FILE" --prerelease \
               --title "Latest Debug Build ($TAG_NAME)" \
               --notes "Auto-build from commit $GITHUB_SHA" \
               --target $GITHUB_SHA
          fi
